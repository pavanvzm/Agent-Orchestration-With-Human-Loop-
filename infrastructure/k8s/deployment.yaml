# Kubernetes Deployment Configuration
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-platform-api
  namespace: agent-platform
  labels:
    app: agent-platform
    component: api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: agent-platform
      component: api
  template:
    metadata:
      labels:
        app: agent-platform
        component: api
    spec:
      containers:
      - name: api
        image: ghcr.io/your-org/multi-agent-platform/backend:latest
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: agent-platform-secrets
              key: database-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: agent-platform-secrets
              key: redis-url
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: agent-platform-secrets
              key: secret-key
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: agent-platform-secrets
              key: openai-api-key
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: agent-platform-api
  namespace: agent-platform
spec:
  selector:
    app: agent-platform
    component: api
  ports:
  - port: 80
    targetPort: 8000
    name: http
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-platform-frontend
  namespace: agent-platform
  labels:
    app: agent-platform
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: agent-platform
      component: frontend
  template:
    metadata:
      labels:
        app: agent-platform
        component: frontend
    spec:
      containers:
      - name: frontend
        image: ghcr.io/your-org/multi-agent-platform/frontend:latest
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: NEXT_PUBLIC_API_URL
          value: "http://agent-platform-api"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: agent-platform-frontend
  namespace: agent-platform
spec:
  selector:
    app: agent-platform
    component: frontend
  ports:
  - port: 80
    targetPort: 3000
    name: http
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agent-platform-ingress
  namespace: agent-platform
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
  - hosts:
    - api.agent-platform.example.com
    - app.agent-platform.example.com
    secretName: agent-platform-tls
  rules:
  - host: api.agent-platform.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: agent-platform-api
            port:
              number: 80
  - host: app.agent-platform.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: agent-platform-frontend
            port:
              number: 80
---
apiVersion: v1
kind: Namespace
metadata:
  name: agent-platform
