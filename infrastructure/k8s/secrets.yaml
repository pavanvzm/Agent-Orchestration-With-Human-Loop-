# Kubernetes Secrets Template
# Copy this file and fill in actual values
# NEVER commit actual secrets to version control!

apiVersion: v1
kind: Secret
metadata:
  name: agent-platform-secrets
  namespace: agent-platform
type: Opaque
stringData:
  # Database connection string
  database-url: "postgresql://user:password@postgres:5432/agent_platform"
  
  # Redis connection string
  redis-url: "redis://redis:6379/0"
  
  # JWT secret key (generate with: openssl rand -hex 32)
  secret-key: "REPLACE_WITH_GENERATED_SECRET_KEY"
  
  # OpenAI API key
  openai-api-key: "sk-REPLACE_WITH_YOUR_OPENAI_KEY"
  
  # Anthropic API key (if using Claude)
  # anthropic-api-key: "sk-ant-REPLACE_WITH_YOUR_ANTHROPIC_KEY"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: agent-platform-config
  namespace: agent-platform
type: Opaque
data:
  # Base64 encoded values
  LOG_LEVEL: "INFO"
  ENVIRONMENT: "production"
  LLM_PROVIDER: "openai"
  LLM_MODEL: "gpt-4-turbo-preview"
  HITL_DEFAULT_TIMEOUT_HOURS: "24"
  VECTOR_DB_TYPE: "chroma"
